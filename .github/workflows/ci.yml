name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Validate action.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: YAML syntax + required fields
        run: |
          python - <<'PY'
          import glob, yaml, sys

          # Validate every action in the repo: the root test action plus any
          # future subdirectory (per-integration) actions.
          files = sorted(glob.glob("**/action.yml", recursive=True))
          assert files, "no action.yml found"

          for path in files:
              with open(path) as f:
                  action = yaml.safe_load(f)
              for field in ("name", "description", "runs"):
                  assert field in action, f"{path}: missing top-level field: {field}"
              assert action["runs"]["using"] in ("composite", "docker", "node20"), \
                  f"{path}: unexpected runs.using: {action['runs']['using']}"
              assert len(action["description"]) <= 125, \
                  f"{path}: Marketplace caps description at 125 chars"
              print(f"{path} OK")
          PY

  sarif:
    name: SARIF transform tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run unit tests
        run: python3 -m unittest discover -s test -v

  smoke:
    name: CLI installs and runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install and verify
        run: |
          python -m pip install --quiet "humanbound[engine]"
          hb --version
          hb test --help > /dev/null

  # Real adversarial run against the mock agent. Needs an LLM key, so it only
  # runs on pushes to main in the canonical repo (never on fork PRs).
  e2e:
    name: End-to-end (quick scan vs mock agent)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload (dormant while the repo is private)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check secret availability
        id: secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OPENAI_API_KEY secret not set — skipping e2e"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start mock agent
        if: steps.secrets.outputs.available == 'true'
        run: |
          python test/mock-agent.py &
          sleep 1
          curl -sf -X POST http://127.0.0.1:8765/chat -d '{"content":"ping"}' > /dev/null

      - name: Run the action against the mock agent
        if: steps.secrets.outputs.available == 'true'
        id: hb
        uses: ./
        with:
          endpoint: test/bot-config.json
          provider-api-key: ${{ secrets.OPENAI_API_KEY }}
          level: quick
          fail-on: ""   # report-only: e2e verifies plumbing, not the mock's security

      - name: Upload results artifact
        # the empty-string check matters: upload-artifact hard-fails on an
        # empty path input when the action failed before exporting results
        if: always() && steps.secrets.outputs.available == 'true' && steps.hb.outputs.results-file != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results
          path: ${{ steps.hb.outputs.results-file }}
          if-no-files-found: warn

      # Lights up automatically once the repo is public (code scanning on
      # private repos requires the paid Code Security add-on).
      - name: Upload SARIF to code scanning
        if: always() && github.event.repository.visibility == 'public' && steps.hb.outputs.sarif-file != ''
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          sarif_file: ${{ steps.hb.outputs.sarif-file }}
