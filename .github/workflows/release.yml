name: Release

# On every semver tag (v1.2.3), move the matching major tag (v1) so users
# pinned to `humanbound/hb-test@v1` get the release automatically.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Update major version tag
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"   # v1.2.3 -> v1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$GITHUB_REF_NAME"
          git push -f origin "$MAJOR"
